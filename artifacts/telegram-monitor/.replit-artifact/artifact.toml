kind = "web"
previewPath = "/"
title = "Telegram Bot Monitor"
version = "1.0.0"
id = "artifacts/telegram-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24769

[services.development]
run = "pnpm --filter @workspace/telegram-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/telegram-monitor", "run", "build" ]
publicDir = "artifacts/telegram-monitor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24769"
BASE_PATH = "/"
